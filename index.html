    <style>

        @keyframes float-1{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(80px,-60px) scale(1.1)}50%{transform:translate(-40px,-120px) scale(.95)}75%{transform:translate(60px,-40px) scale(1.05)}}

        .reveal{opacity:0;transform:translateY(30px);filter:blur(6px);transition:all .8s cubic-bezier(.16,1,.3,1)}
        .reveal.active{opacity:1;transform:translateY(0);filter:blur(0)}
        .reveal-delay-1{transition-delay:100ms}.reveal-delay-2{transition-delay:200ms}.reveal-delay-3{transition-delay:300ms}.reveal-delay-4{transition-delay:400ms}

        /* ========== CARD GLOW FIX ========== */
        .card-glow{position:relative}
        .card-glow::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;
            background:linear-gradient(135deg,rgba(59,130,246,0),rgba(59,130,246,.3),rgba(139,92,246,.3),rgba(59,130,246,0));
            -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
            mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
            -webkit-mask-composite:xor;mask-composite:exclude;
            opacity:0;transition:opacity .5s ease;pointer-events:none;z-index:0}
        .card-glow:hover::before{opacity:1}
        /* ==================================== */

        .btn-shine{position:relative;overflow:hidden}
        .btn-shine::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
            background:linear-gradient(to right,transparent 0%,rgba(255,255,255,.1) 50%,transparent 100%);
            transform:rotate(30deg) translateX(-100%);transition:transform .6s ease;pointer-events:none}
        .btn-shine:hover::after{transform:rotate(30deg) translateX(100%)}
        .grid-bg{background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:60px 60px}
        .grid-bg-fine{background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px}

        .dashboard-mockup{background:linear-gradient(145deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden}
        .mockup-bar{display:flex;gap:6px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
        .mockup-dot{width:10px;height:10px;border-radius:50%}
        .nav-dropdown{opacity:0;visibility:hidden;transform:translateY(8px);transition:all .2s ease}
        .nav-item:hover .nav-dropdown{opacity:1;visibility:visible;transform:translateY(0)}
        .mobile-menu{transform:translateX(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
        .mobile-menu.open{transform:translateX(0)}
        .feature-icon{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(139,92,246,.1));border:1px solid rgba(59,130,246,.2)}
        .section-separator{height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.08),transparent)}
        .toast{transform:translateY(100px);opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1)}
        .toast.show{transform:translateY(0);opacity:1}
        .logo-dark-bg{transition:filter .3s ease}
